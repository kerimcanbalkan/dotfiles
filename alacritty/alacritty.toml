[general]
live_config_reload = true
import = ["~/.config/alacritty/tomorrow.toml"]

[env]
TERM = "xterm-256color"

[font]
size = 13.5

[font.bold]
family = "Aporetic Sans Mono"
style = "Heavy"

[font.bold_italic]
family = "Aporetic Sans Mono"
style = "Heavy Italic"

[font.italic]
family = "Aporetic Sans Mono"
style = "Medium Italic"

[font.normal]
family = "Aporetic Sans Mono"
style = "Medium"

[window]
decorations = "buttonless"
dynamic_padding = false

[window.padding]
x = 25
y = 20
