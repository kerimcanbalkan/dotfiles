monitor = eDP-1,1920x1080,0x0,1

exec-once = kanshi
exec-once = hyprctl 
exec-once = waybar
exec-once = swaync 
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = hyprctl setcursor Nordzy-cursors-white 24
exec-once = hypridle 
exec-once = swww-daemon &
exec-once = sleep 1 && swww img ~/Pictures/Wallpapers/pixel-city.png
exec-once = nwg-dock-hyprland -d
exec-once = hyprpaper
exec-once = foot --server

# Set programs that you use
$terminal = footclient
$menu = wmenu-run -f "Aporetic Sans Mono 13" -N 16161D80 -n DCD7BA -S 65859480 -s DCD7BA 
$browser = brave
$emacs = emacsclient -c
$fileManager = thunar

# Some default env vars.
# Environment variables for cursor - CRITICAL for Hyprland
env = XCURSOR_THEME,Nordzy-cursors-white
env = XCURSOR_SIZE,24

# Hyprcursor support (newer Hyprland versions)
env = HYPRCURSOR_THEME,Nordzy-cursors-white
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that


# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us,tr
    kb_variant =
    kb_options = ctrl:nocaps,grp:rwin_space_toggle
    repeat_delay = 170
    repeat_rate = 90

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0.8 # -1.0 to 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    # no_border_on_floating = true
    # cursor_inactive_timeout = 4
    no_focus_fallback = true
    resize_on_border = true

    gaps_in = 3 
    gaps_out = 3
    border_size = 0
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
  active_opacity = 1
  inactive_opacity = 0.85

    rounding = 3 
    
    blur {
        enabled = true
        size = 2
        passes = 3
        new_optimizations = true
        ignore_opacity = true
    }

}

animations {
    enabled = yes

    # Smooth bezier curves
    bezier = myBezier, 0.05, 0.7, 0.1, 1.0
    bezier = easeOutQuint, 0.22, 1, 0.36, 1

    # Increased durations to make animations more noticeable
    animation = windows, 0.7, 4, myBezier, popin
    animation = windowsOut, 0.6, 3, default, popin 80%
    animation = border, 0.4, 3, default
    animation = fade, 0.4, 3, default
    animation = workspaces, 0.8, 3, easeOutQuint, slide
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

# master {
#     # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
#     new_is_master = true
# }

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gesture = 3, horizontal, workspace
    gesture = 2, pinch, resize
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    animate_mouse_windowdragging = true
    animate_manual_resizes = true
    disable_splash_rendering = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
}

 # Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Open wmenu
bind = $mainMod ,p, exec, $menu

# Open footclient
bind = $mainMod ,RETURN, exec, $terminal

# Launch emacs
bind = $mainMod ,e, exec, $emacs

# Lock Screen
bind = $mainMod SHIFT, L, exec, hyprlock
# Open notification
bind = $mainMod SHIFT, N, exec, swaync-client -t -sw
# btop
bind = $mainMod CTRL, B, exec, $btop
# Screenshot
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh
bind = $mainMod CONTROL, T, exec, ~/.config/hypr/scripts/ocr-screenshot.sh
# Hyprpicker color picker
bind = $mainMod SHIFT, C, exec, hyprpicker -a
# Wallpaper switcher
bind = $mainMod CONTROL, W, exec, ~/.config/hypr/scripts/swww.sh
bind = $mainMod, C, exec, wl-kbptr -o modes=floating,click -o mode_floating.source=detect

# Volume controls
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness controls
bind=,XF86MonBrightnessDown,exec,brightnessctl set 5%-
bind=,XF86MonBrightnessUp,exec,brightnessctl set +5%

# Mute and unmute:
bind = , XF86AudioMicMute, exec, amixer set Capture toggle

bind = $mainMod, Q, killactive, 
bind = $mainMod SHIFT, 0, exit, 
bind = $mainMod, T, togglefloating, 
bind = $mainMod, SHIFT O, pseudo, # dwindle
bind = $mainMod, M, togglesplit, # dwindle
bind = ALT, Tab, cyclenext,
bind = $mainMod SHIFT, Tab, cyclenext, prev
bind = ALT, Tab, bringactivetotop,
bind = $mainMod SHIFT, F, fullscreen

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
# bind = $mainMod, 8, workspace, 8
# bind = $mainMod, 9, workspace, 9

# Move active window to a workspace with mainMod + CTRL + SHIFT + [0-7]
bind = $mainMod  SHIFT, 1, movetoworkspace, 1
bind = $mainMod  SHIFT, 2, movetoworkspace, 2
bind = $mainMod  SHIFT, 3, movetoworkspace, 3
bind = $mainMod  SHIFT, 4, movetoworkspace, 4
bind = $mainMod  SHIFT, 5, movetoworkspace, 5
bind = $mainMod  SHIFT, 6, movetoworkspace, 6
bind = $mainMod  SHIFT, 7, movetoworkspace, 7
# bind = $mainMod SHIFT, 8, movetoworkspace, 8
# bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Move active window with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Swap windows with mainMod + ALT + SHIFT + arrow keys
bind = $mainMod META, left, swapwindow, l
bind = $mainMod META, right, swapwindow, r
bind = $mainMod META, up, swapwindow, u
bind = $mainMod META, down, swapwindow, d

# Resizing
binde = $mainMod CTRL, left, resizeactive, -20 0
binde = $mainMod CTRL, right, resizeactive, 20 0
binde = $mainMod CTRL, up, resizeactive, 0 -20
binde = $mainMod CTRL, down, resizeactive, 0 20

# Volume up/down
bindel=META, up, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel=META, down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
